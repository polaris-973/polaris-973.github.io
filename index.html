">2021-12-07</time></span><span class="level-item"><a class="link-muted" href="/categories/Latex/">Latex</a></span><span class="level-item">a few seconds read (About 0 words)</span></div></div><h1 class="title is-3 is-size-4-mobile"><a class="link-muted" href="/2021/12/07/Latex%E4%BB%8B%E7%BB%8D%E4%B8%8E%E5%9F%BA%E7%A1%80%E6%95%99%E7%A8%8B/">Latex介绍与基础教程</a></h1><div class="content"><object data="/files/pdf/Latex介绍与基础教程.pdf" type="application/pdf" width="100%" height="877px"></div></article></div><div class="card"><article class="card-content article" role="article"><div class="article-meta is-size-7 is-uppercase level is-mobile"><div class="level-left"><span class="level-item">Posted&nbsp;<time dateTime="2021-12-06T08:58:00.000Z" title="6/12/2021, 16:58:00">2021-12-06</time></span><span class="level-item">Updated&nbsp;<time dateTime="2021-12-07T09:01:15.403Z" title="7/12/2021, 17:01:15">2021-12-07</time></span><span class="level-item"><a class="link-muted" href="/categories/%E5%88%B7%E9%A2%98/">刷题</a></span><span class="level-item">12 minutes read (About 1772 words)</span></div></div><h1 class="title is-3 is-size-4-mobile"><a class="link-muted" href="/2021/12/06/%E5%88%B7%E9%A2%98%E7%AC%94%E8%AE%B0%E2%80%94%E2%80%94%E3%80%90%E6%95%B0%E6%8D%AE%E7%BB%93%E6%9E%84%EF%BC%9A%E9%93%BE%E8%A1%A8%E3%80%91/">刷题笔记——【数据结构：链表】</a></h1><div class="content"><h2 id="链表的概念"><a href="#链表的概念" class="headerlink" title="链表的概念"></a>链表的概念</h2><p>我们知道数组是很常用的数据储存方式，而链表就是继数组之后，第二种最通用的数据储存方式了。数组需要存放在连续的空间，计算机很容易实现。而链表的好处是不用确定空间长度，不够的时候，直接申请新的节点，帮助插入。所以链表可以更灵活地进行内存分配。</p>
<p>链表（linked list）是一种序列形的数据结构，其中包含了很多通过链接 (link) 被串起来的节点。每个节点有一个数据域，储存着节点的数值，还有一个指针域，指向下一个节点。</p>
<p><img src="https://i1.wp.com/www.tutorialspoint.com/data_structures_algorithms/images/linked_list.jpg?w=1170&ssl=1" alt="Linked List"></p></div><a class="article-more button is-small is-size-7" href="/2021/12/06/%E5%88%B7%E9%A2%98%E7%AC%94%E8%AE%B0%E2%80%94%E2%80%94%E3%80%90%E6%95%B0%E6%8D%AE%E7%BB%93%E6%9E%84%EF%BC%9A%E9%93%BE%E8%A1%A8%E3%80%91/#more">Read more</a></article></div><div class="card"><article class="card-content article" role="article"><div class="article-meta is-size-7 is-uppercase level is-mobile"><div class="level-left"><span class="level-item">Posted&nbsp;<time dateTime="2021-12-05T13:46:13.000Z" title="5/12/2021, 21:46:13">2021-12-05</time></span><span class="level-item">Updated&nbsp;<time dateTime="2021-12-07T09:06:49.927Z" title="7/12/2021, 17:06:49">2021-12-07</time></span><span class="level-item"><a class="link-muted" href="/categories/%E6%95%B0%E6%8D%AE%E6%8C%96%E6%8E%98/">数据挖掘</a></span><span class="level-item">3 minutes read (About 440 words)</span></div></div><h1 class="title is-3 is-size-4-mobile"><a class="link-muted" href="/2021/12/05/%E6%95%B0%E6%8D%AE%E6%8C%96%E6%8E%98%E5%AD%A6%E4%B9%A0_EFIM%20Algorithm/">数据挖掘学习_EFIM Algorithm</a></h1><div class="content"><h1 id="EFIM-Algorithm"><a href="#EFIM-Algorithm" class="headerlink" title="EFIM Algorithm"></a>EFIM Algorithm</h1><p>该算法相比于HUI-Miner算法，主要的贡献有</p>
<ol>
<li>提出了两个更为紧凑的上界来更有效地裁剪搜索空间：sub-tree utility 以及 local utility。</li>
<li>提出一种基于数组（utility bin array）的效用计数技术，从而能够在线性时间内获取后续需要的效用上界值。</li>
<li>提出高效的数据库映射和事务合并技术从而能够提高算法的性能。</li>
</ol></div><a class="article-more button is-small is-size-7" href="/2021/12/05/%E6%95%B0%E6%8D%AE%E6%8C%96%E6%8E%98%E5%AD%A6%E4%B9%A0_EFIM%20Algorithm/#more">Read more</a></article></div><div class="card"><article class="card-content article" role="article"><div class="article-meta is-size-7 is-uppercase level is-mobile"><div class="level-left"><span class="level-item">Posted&nbsp;<time dateTime="2021-11-15T13:46:13.000Z" title="15/11/2021, 21:46:13">2021-11-15</time></span><span class="level-item">Updated&nbsp;<time dateTime="2021-12-07T08:57:19.681Z" title="7/12/2021, 16:57:19">2021-12-07</time></span><span class="level-item"><a class="link-muted" href="/categories/%E6%95%B0%E6%8D%AE%E6%8C%96%E6%8E%98/">数据挖掘</a></span><span class="level-item">16 minutes read (About 2386 words)</span></div></div><h1 class="title is-3 is-size-4-mobile"><a class="link-muted" href="/2021/11/15/%E6%95%B0%E6%8D%AE%E6%8C%96%E6%8E%98%E5%AD%A6%E4%B9%A0_HUI-Miner%E7%AE%97%E6%B3%95/">数据挖掘学习_HUI-Miner算法</a></h1><div class="content"><h2 id="本文贡献"><a href="#本文贡献" class="headerlink" title="本文贡献"></a>本文贡献</h2><ol>
<li>提出了一种新的结构——效用表（utility list）。不仅存储关于项集的使用程序信息，还存储关于项集是否该被修剪的启发式信息。</li>
<li>一种高效的算法HUI-Miner。不同于原有的算法，HUI-Miner不需要生成候选高效用项集，在从数据库构建初始效用列表后，HUI-Miner 可以<strong>从这些效用列表中</strong>挖掘高效用项集。</li>
<li>在各种数据库上进行了广泛的实验，以比较HUI-Miner与最先进的算法。实验结果表明，HUI-Miner算法优于上述算法。</li>
</ol></div><a class="article-more button is-small is-size-7" href="/2021/11/15/%E6%95%B0%E6%8D%AE%E6%8C%96%E6%8E%98%E5%AD%A6%E4%B9%A0_HUI-Miner%E7%AE%97%E6%B3%95/#more">Read more</a></article></div><div class="card"><article class="card-content article" role="article"><div class="article-meta is-size-7 is-uppercase level is-mobile"><div class="level-left"><span class="level-item">Posted&nbsp;<time dateTime="2021-11-13T09:18:00.711Z" title="13/11/2021, 17:18:00">2021-11-13</time></span><span class="level-item">Updated&nbsp;<time dateTime="2021-11-13T09:18:00.711Z" title="13/11/2021, 17:18:00">2021-11-13</time></span><span class="level-item">a few seconds read (About 0 words)</span></div></div><div class="content"></div></article></div><div class="card"><article class="card-content article" role="article"><div class="article-meta is-size-7 is-uppercase level is-mobile"><div class="level-left"><span class="level-item">Posted&nbsp;<time dateTime="2021-11-11T15:29:54.501Z" title="11/11/2021, 23:29:54">2021-11-11</time></span><span class="level-item">Updated&nbsp;<time dateTime="2021-11-11T15:30:07.787Z" title="11/11/2021, 23:30:07">2021-11-11</time></span><span class="level-item">28 minutes read (About 4252 words)</span></div></div><div class="content"><h1 id="OLAP和数据立方体"><a href="#OLAP和数据立方体" class="headerlink" title="OLAP和数据立方体"></a>OLAP和数据立方体</h1><ul>
<li>[TOC]</li>
</ul>
<h2 id="数据仓库"><a href="#数据仓库" class="headerlink" title="数据仓库"></a>数据仓库</h2><p>数据仓库的目的是构建面向分析的集成化数据环境，为企业提供决策支持（Decision Support）。其实数据仓库本身并不“生产”任何数据，同时自身也不需要“消费”任何的数据，数据来源于外部，并且开放给外部应用。因此数据仓库的基本架构主要包含的是数据流入流出的过程，可以分为三层——源数据、数据仓库、数据应用：<br><img src="https://i2.wp.com/img-blog.csdnimg.cn/2020040623224938.png?x-oss-process=image/watermark,type_ZmFuZ3poZW5naGVpdGk,shadow_10,text_aHR0cHM6Ly9ibG9nLmNzZG4ubmV0L3FxXzQxNzc1ODUy,size_16,color_FFFFFF,t_70" alt="在这里插入图片描述"><br>数据仓库从各数据源获取数据及在数据仓库内的数据转换和流动都可以认为是ETL（抽取Extra, 转化Transfer, 装载Load）的过程，ETL是数据仓库的流水线，也可以认为是数据仓库的血液，它维系着数据仓库中数据的新陈代谢，而数据仓库日常的管理和维护工作的大部分精力就是保持ETL的正常和稳定。</p>
<h2 id="多维数据模型"><a href="#多维数据模型" class="headerlink" title="多维数据模型"></a>多维数据模型</h2><p>多维数据模型是为了满足用户从多角度多层次进行数据查询和分析的需要而建立起来的基于事实和维的数据库模型，其基本的应用是为了实现OLAP（Online Analytical Processing）。</p>
<h3 id="事实表和维表"><a href="#事实表和维表" class="headerlink" title="事实表和维表"></a>事实表和维表</h3><p>事实表是用来记录具体事件的，包含了每个事件的具体要素，以及具体发生的事情；维表则是对事实表中事件的要素的描述信息。比如一个事件会包含时间、地点、人物、事件，事实表记录了整个事件的信息，但对时间、地点和人物等要素只记录了一些关键标记，比如事件的主角叫“Michael”，那么Michael到底“长什么样”，就需要到相应的维表里面去查询“Michael”的具体描述信息了。基于事实表和维表就可以构建出多种多维模型，包括星形模型、雪花模型和星座模型。<br><img src="https://i2.wp.com/img-blog.csdnimg.cn/20200406233223749.png?x-oss-process=image/watermark,type_ZmFuZ3poZW5naGVpdGk,shadow_10,text_aHR0cHM6Ly9ibG9nLmNzZG4ubmV0L3FxXzQxNzc1ODUy,size_16,color_FFFFFF,t_70" alt="在这里插入图片描述"><br>这是一个最简单的星形模型的实例。事实表里面主要包含两方面的信息：维和度量，维的具体描述信息记录在维表，事实表中的维属性只是一个关联到维表的键，并不记录具体信息；度量一般都会记录事件的相应数值，比如这里的产品的销售数量、销售额等。维表中的信息一般是可以分层的，比如时间维的年月日、地域维的省市县等，这类分层的信息就是为了满足事实表中的度量可以在不同的粒度上完成聚合，比如2010年商品的销售额，来自上海市的销售额等。</p>
<h3 id="数据立方体和OLAP"><a href="#数据立方体和OLAP" class="headerlink" title="数据立方体和OLAP"></a>数据立方体和OLAP</h3><p>数据立方体（Data Cube），只是多维模型的一个形象的说法。立方体其本身只有三维，但多维模型不仅限于三维模型，可以组合更多的维度。<br><img src="https://i2.wp.com/img-blog.csdnimg.cn/20200406233512717.png?x-oss-process=image/watermark,type_ZmFuZ3poZW5naGVpdGk,shadow_10,text_aHR0cHM6Ly9ibG9nLmNzZG4ubmV0L3FxXzQxNzc1ODUy,size_16,color_FFFFFF,t_70" alt="在这里插入图片描述"><br>OLAP（On-line Analytical Processing，联机分析处理）是在基于数据仓库多维模型的基础上实现的面向分析的各类操作的集合。其与传统的OLTP（On-line Transaction Processing，联机事务处理）的区别如下：<br><img src="https://i2.wp.com/img-blog.csdnimg.cn/2020040623380280.png?x-oss-process=image/watermark,type_ZmFuZ3poZW5naGVpdGk,shadow_10,text_aHR0cHM6Ly9ibG9nLmNzZG4ubmV0L3FxXzQxNzc1ODUy,size_16,color_FFFFFF,t_70" alt="在这里插入图片描述"></p>
<h4 id="OLAP的基本操作"><a href="#OLAP的基本操作" class="headerlink" title="OLAP的基本操作"></a>OLAP的基本操作</h4><p>OLAP的操作是以查询——也就是数据库的SELECT操作为主，但是查询可以很复杂，比如基于关系数据库的查询可以多表关联，可以使用COUNT、SUM、AVG等聚合函数。OLAP正是基于多维模型定义了一些常见的面向分析的操作类型是这些操作显得更加直观。</p>
<p>OLAP的多维分析操作包括：钻取（Drill-down）、上卷（Roll-up）、切片（Slice）、切块（Dice）以及旋转（Pivot）。</p>
<p><img src="https://i2.wp.com/img-blog.csdnimg.cn/20200406233913646.png?x-oss-process=image/watermark,type_ZmFuZ3poZW5naGVpdGk,shadow_10,text_aHR0cHM6Ly9ibG9nLmNzZG4ubmV0L3FxXzQxNzc1ODUy,size_16,color_FFFFFF,t_70" alt="在这里插入图片描述"></p>
<ul>
<li>钻取（Drill-down）：在维的不同层次间的变化，从上层降到下一层，或者说是将汇总数据拆分到更细节的数据，比如通过对2010年第二季度的总销售数据进行钻取来查看2010年第二季度4、5、6每个月的消费数据，如上图；当然也可以钻取浙江省来查看杭州市、宁波市、温州市……这些城市的销售数据。</li>
<li>上卷（Roll-up）：钻取的逆操作，即从细粒度数据向高层的聚合，如将江苏省、上海市和浙江省的销售数据进行汇总来查看江浙沪地区的销售数据，如上图。</li>
<li>切片（Slice）：选择维中特定的值进行分析，比如只选择电子产品的销售数据，或者2010年第二季度的数据。</li>
<li>切块（Dice）：选择维中特定区间的数据或者某批特定值进行分析，比如选择2010年第一季度到2010年第二季度的销售数据，或者是电子产品和日用品的销售数据。</li>
<li>旋转（Pivot）：即维的位置的互换，就像是二维表的行列转换，如图中通过旋转实现产品维和地域维的互换。</li>
</ul>
<h4 id="维和立方"><a href="#维和立方" class="headerlink" title="维和立方"></a>维和立方</h4><p><strong>维（Dimension）</strong><br>维是用于从不同角度描述事物特征的，一般维都会有多层（Level），每个Level都会包含一些共有的或特有的属性（Attribute），可以用下图来展示下维的结构和组成：<br><img src="https://i2.wp.com/img-blog.csdnimg.cn/20200406234118694.png?x-oss-process=image/watermark,type_ZmFuZ3poZW5naGVpdGk,shadow_10,text_aHR0cHM6Ly9ibG9nLmNzZG4ubmV0L3FxXzQxNzc1ODUy,size_16,color_FFFFFF,t_70" alt="在这里插入图片描述"><br>以时间维为例，时间维一般会包含年、季、月、日这几个Level，每个Level一般都会有ID、NAME、DESCRIPTION这几个公共属性，这几个公共属性不仅适用于时间维，也同样表现在其它各种不同类型的维。</p>
<p><strong>Hierarchy</strong></p>
<p>上面这个结构的维是无法直接应用于OLAP的，OLAP需要基于有层级的自上而下的钻取，或者自下而上地聚合。所以每一个维必须有Hierarchy，至少有一个默认的，当然可以有多个，见下图：<br><img src="https://i2.wp.com/img-blog.csdnimg.cn/20200406234316371.png?x-oss-process=image/watermark,type_ZmFuZ3poZW5naGVpdGk,shadow_10,text_aHR0cHM6Ly9ibG9nLmNzZG4ubmV0L3FxXzQxNzc1ODUy,size_16,color_FFFFFF,t_70" alt="在这里插入图片描述"><br>有了Hierarchy，维里面的Level就有了自上而下的树形结构关系，也就是上层的每一个成员（Member）都会包含下层的0个或多个成员，也就是树的分支节点。这里需要注意的是每个Hierarchy树的根节点一般都设置成所有成员的汇总（Total），当该维未被OLAP中使用时，默认显示的就是该维上的汇总节点，也就是该维所有数据的聚合（或者说该维未被用于细分）。Hierarchy中的每一层都会包含若干个成员（Member），还是以时间维，假设我们建的是2006-2015这样一个时间跨度的时间维，那么最高层节点仅有一个Total的成员，包含了所有这10年的时间，而年的那层Level中包含2006、2007…2015这10个成员，每一年又包含了4个季度成员，每个季度包含3个月份成员……</p>
<p>每个Hierarchy都包含了一个树形结构，但维中也可以包含多个Hierarchy，正如上图所示，维中的Hierarchy相互独立地构建了自己的树形结构。还是以时间维为例，时间维可以根据日历（Calendar）时间组建日历的Hierarchy，也可以根据财务（Fiscal）时间组建财务的Hierarchy，而其中财务季度的划分可能并不与日历一致，基于这种多样的Hierarchy，我们在组建多维模型时可以按需选择合适的，比如给财务部的数据分析模型选用财务Hierarchy，而其他部门的分析人员显然希望看到日历样式的Hierarchy，这样就完美地满足了不同的需求。<br>　<br><strong>立方（Cube）</strong><br>这里所说的立方其实就是多维模型中间的事实表（Fact Table），它会引用所有相关维的维主键作为自身的联合主键，加上度量（Measure）和计算度量（Calculated Measure）就组成了立方的结构：<br><img src="https://i2.wp.com/img-blog.csdnimg.cn/20200406234546795.png?x-oss-process=image/watermark,type_ZmFuZ3poZW5naGVpdGk,shadow_10,text_aHR0cHM6Ly9ibG9nLmNzZG4ubmV0L3FxXzQxNzc1ODUy,size_16,color_FFFFFF,t_70" alt="在这里插入图片描述"><br>度量是用于描述事件的数字尺度，比如网站的浏览量（Pageviews）、访问量（Visits），再如电子商务的订单量、销售额等。度量是实际储存于物理表中的，而计算度量则没有，计算度量是通过度量计算得到的，比如同比（如去年同期的月利润）、环比（如上个月的利润）、利率（如环比利润增长率）、份额（如该月中某类产品利润所占比例）、累计（如从年初到当前的累加利润）、移动平均（如最近7天的平均利润额）等，这些计算度量在Oracle中都可以借助分析函数直接计算得到，相信大部分的OLAP组件都会提供类似在时间序列上的分析功能。而这些计算度量往往对于分析而言更具意义，立方中借助与各个维的关联关系从不同的角度和层面来展现这些度量。</p>
<h2 id="数据立方体实例"><a href="#数据立方体实例" class="headerlink" title="数据立方体实例"></a>数据立方体实例</h2><p>数据立方体是数据仓库和OLAP的基本工具。从概念上讲，数据立方体是一个多层次、多维的数据库，具有各种不同的粒度聚合。它是group-by操作符的泛化，包含与维列表的所有可能组合对应的group-bys。</p>
<p>例子：在一个marketing management data warehouse中，以模式 <strong>sales(Store, Product, Season, Sale)</strong> 进行数据收集。基本事实表如下图，属性Store, Product，Season被称为维度，Sale被称为度量。<br><img src="https://i2.wp.com/img-blog.csdnimg.cn/20200406235154369.png" alt="在这里插入图片描述"><br>数据立方体是由{Store, Product, Season}的每个子集组成的groupBy分组（共有8个groupBy），使用诸如AVG(Sale)这样的聚合函数，进行分组聚合返回的结果集。每个group by对应于一组单元格。如下图所示，维度中的符号“*”表示将该维度一般化，以便匹配其域中的任何值。数据立方体如下图：<br><img src="https://i2.wp.com/img-blog.csdnimg.cn/20200406235716557.png?x-oss-process=image/watermark,type_ZmFuZ3poZW5naGVpdGk,shadow_10,text_aHR0cHM6Ly9ibG9nLmNzZG4ubmV0L3FxXzQxNzc1ODUy,size_16,color_FFFFFF,t_70" alt="在这里插入图片描述"></p>
<h2 id="数据立方体物化"><a href="#数据立方体物化" class="headerlink" title="数据立方体物化"></a>数据立方体物化</h2><p>分组的属性的组合叫方体（cuboid），数据单元（cell）就是方体中的一个元组，分组的属性有 i 个的方 体称为 i 维方体。例如创建一个数据仓库 sales 用来记录商店的销售，包括四个维 分别是 Product（产品）、Time（时间）、Location（城市）、Sales（销量），将 不同属性聚集数据可以形成 0 维方体，1 维方体，2 维方体，3 维方体，4 维方体 方体形成的数据立方体的格如图所示。<br><img src="https://i2.wp.com/img-blog.csdnimg.cn/20200407000800650.png?x-oss-process=image/watermark,type_ZmFuZ3poZW5naGVpdGk,shadow_10,text_aHR0cHM6Ly9ibG9nLmNzZG4ubmV0L3FxXzQxNzc1ODUy,size_16,color_FFFFFF,t_70" alt="在这里插入图片描述"><br><strong>数据立方体是由原始数据事实表中记录的所有方体构成的</strong>。通过原始数据来构建数据仓库时，直接获得的只有包含数据立方体中的基本方体（上述四维方体），而想要获得所有方体，必须通过相关操作聚集物化。对于一个 n 维数据立方体来说，包含的方体的总数为：<br><img src="https://i2.wp.com/img-blog.csdnimg.cn/20200407001129649.png" alt="在这里插入图片描述"><br>其中 Li 为第 i 个维度的维度层次（level）数。</p>
<p>所以对于一个多维度、多层次的数据立方体，其方体的数量多，计算全部的方体是耗时耗空间的工作。因此对于不同体量的数据立方体应 该采取不同的物化策略，对于数据立方体的物化方法，大致包括：全物化、部分 物化、不物化这三种。</p>
<ul>
<li>全物化是指计算并存储当前数据可以聚集物化获得的所有方体的结果，覆盖整个数据立方体。当维度、维度层次数量较多时，全物化需要花费大量的时间和 空间来计算和存储这些方体。全物化带来的好处主要是可以显著提高查询的效率。 由于所有的方体都已经被计算和存储，因而查询时可以直接获得结果。</li>
<li>部分物化是指针对数据立方体可以获得的方体，进行有选择性地计算并部分 存储，这种方法需要花费旳时间少于全物化，具体的时间与选择物化的方式有关。 对于查询而言，如果查询的数据是已经物化的，则查询效率高、若查询的数据没 有被物化，则查询效率与不物化相同。</li>
<li>不物化是指仅保留数据立方体中的基本方体，即最详细的记录，不计算任何其他聚集后的方体。这种方法虽然省时省空间，但是在查询时，只要查询记录不是基本方体，都需要进行相关的计算才能获得查询结果，查询效率最差。</li>
</ul>
<p>上一节中的数据立方体实例即为全物化。</p>
<p>针对于数据立方体存储的研究，很多学者提出了不同的压缩模型，例如冰山立方体、封闭立方体、商立方体等等。封闭立方体在物化过程中，只保存了所有等价类的上界。因此在封闭立方体中，只包含封 闭单元。传统的封闭立方体虽然可以有效地对原始立方体进行压缩，但是它存在一个缺点：无法对非单调聚集函数进行支持。冰山立方体和封闭立方体都实现了数据立方体的压缩，但是没有考虑方体之间的语义关系。然而在大部分的数据查询 中 ， 都 需 要 通 过 方 体 间 的 语 义 来 获 得 结 果 。 在 这 个 前 提 下 Laks V.S.Lakshmanan等首次提出了商立方体的数据压缩模型。</p>
<p>参考博客：<br><a target="_blank" rel="noopener" href="http://webdataanalysis.net/web-data-warehouse/data-cube-and-olap/">http://webdataanalysis.net/web-data-warehouse/data-cube-and-olap/</a><br><a target="_blank" rel="noopener" href="http://webdataanalysis.net/web-data-warehouse/data-warehouse-frame/">http://webdataanalysis.net/web-data-warehouse/data-warehouse-frame/</a><br><a target="_blank" rel="noopener" href="http://webdataanalysis.net/web-data-warehouse/multidimensional-data-model/">http://webdataanalysis.net/web-data-warehouse/multidimensional-data-model/</a></p>
</div></article></div><div class="card"><article class="card-content article" role="article"><div class="article-meta is-size-7 is-uppercase level is-mobile"><div class="level-left"><span class="level-item">Posted&nbsp;<time dateTime="2021-11-10T07:57:28.110Z" title="10/11/2021, 15:57:28">2021-11-10</time></span><span class="level-item">Updated&nbsp;<time dateTime="2021-11-14T17:00:16.431Z" title="15/11/2021, 01:00:16">2021-11-15</time></span><span class="level-item">30 minutes read (About 4540 words)</span></div></div><div class="content"><h2 id="深度学习的张量操作：Concatenate（连接）-VS-Stack（堆叠？）"><a href="#深度学习的张量操作：Concatenate（连接）-VS-Stack（堆叠？）" class="headerlink" title="深度学习的张量操作：Concatenate（连接） VS Stack（堆叠？）"></a>深度学习的张量操作：Concatenate（连接） VS Stack（堆叠？）</h2><p>在这一集中，我们将剖析将张量串联和堆叠在一起的区别。我们将看三个示例，一个使用 PyTorch，一个使用 TensorFlow，一个使用 NumPy。</p>
<p>作者将演示两个操作在不同框架中的实现区别。</p>
<h3 id="Existing-Vs-New-Axes"><a href="#Existing-Vs-New-Axes" class="headerlink" title="Existing Vs New Axes"></a>Existing Vs New Axes</h3><p>堆叠张量和串联张量之间的区别可以用一句话概括：</p>
<p><code>连接沿现有轴连接一系列张量，堆叠沿新轴连接一系列张量。</code></p>
<p>这就是这一集所介绍的两个张量操作的区别，后面的内容是对这个操作的不同实现和补充。</p>
<h3 id="如何在张量中添加或插入轴"><a href="#如何在张量中添加或插入轴" class="headerlink" title="如何在张量中添加或插入轴"></a>如何在张量中添加或插入轴</h3><figure class="highlight python"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">import</span> torch</span><br><span class="line">t1 = torch.tensor([<span class="number">1</span>,<span class="number">1</span>,<span class="number">1</span>])</span><br></pre></td></tr></table></figure>

<p>如上所示，导入 PyTorch 并创建一个简单的张量<code>t1</code>，它具有一个长度为 3 的轴。现在，要在 PyTorch 中向该张量添加轴，我们使用该<code>unsqueeze()</code>函数。</p>
<figure class="highlight python"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br></pre></td><td class="code"><pre><span class="line">&gt; t1.unsqueeze(dim=<span class="number">0</span>)</span><br><span class="line">tensor([[<span class="number">1</span>, <span class="number">1</span>, <span class="number">1</span>]])</span><br></pre></td></tr></table></figure>

<p>在这里，我们在这个张量索引（dim）为 0 的位置添加了一个轴，或者是一个维度。现在这个张量的形状变成<code>1 x 3</code>。</p>
<p>我们也可以试着在张量的第二个索引处添加一个轴：</p>
<figure class="highlight python"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br></pre></td><td class="code"><pre><span class="line">&gt; t1.unsqueeze(dim=<span class="number">1</span>)</span><br><span class="line">tensor([[<span class="number">1</span>],</span><br><span class="line">        [<span class="number">1</span>],</span><br><span class="line">        [<span class="number">1</span>]])</span><br></pre></td></tr></table></figure>

<p>这个操作则可以看出使这个张量的形状变成了<code>3 x 1</code>，像这样添加轴如我们所见会改变张量内数据的组织方式，但不会改变数据本身。基本上，我们只是在<strong>重塑</strong>（reshape）张量。我们可以通过检查其中每一个的形状来看到这一点。</p>
<figure class="highlight python"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br></pre></td><td class="code"><pre><span class="line">&gt; <span class="built_in">print</span>(t1.shape)</span><br><span class="line">&gt; <span class="built_in">print</span>(t1.unsqueeze(dim=<span class="number">0</span>).shape)</span><br><span class="line">&gt; <span class="built_in">print</span>(t1.unsqueeze(dim=<span class="number">1</span>).shape)</span><br><span class="line">torch.Size([<span class="number">3</span>])</span><br><span class="line">torch.Size([<span class="number">1</span>, <span class="number">3</span>])</span><br><span class="line">torch.Size([<span class="number">3</span>, <span class="number">1</span>])</span><br></pre></td></tr></table></figure>

<p>OK，现在我们回想一下最开始说的串联与堆叠张量，当我们串联时，我们正在沿着现有轴连接一系列张量。这意味着我们正在扩展现有轴的<strong>长度</strong>。</p>
<p>当我们堆叠时，我们正在创建一个以前不存在的新轴，这发生在我们序列中的所有张量中，然后我们<strong>沿着这个新序列连接</strong>。</p>
<h3 id="PyTorch-中的-Stack-Vs-Cat"><a href="#PyTorch-中的-Stack-Vs-Cat" class="headerlink" title="PyTorch 中的 Stack Vs Cat"></a>PyTorch 中的 Stack Vs Cat</h3><p>我们用于这些操作的两个函数是<code>stack</code>和<code>cat</code>。</p>
<p>建立三个张量<code>t1</code> <code>t2</code> <code>t3</code> </p>
<figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br></pre></td><td class="code"><pre><span class="line">import torch</span><br><span class="line"></span><br><span class="line">t1 = torch.tensor([1, 1, 1])</span><br><span class="line">t2 = torch.tensor([2, 2, 2])</span><br><span class="line">t3 = torch.tensor([3, 3, 3])</span><br></pre></td></tr></table></figure>

<p>现在进行连接操作即<code>cat</code></p>
<figure class="highlight python"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br></pre></td><td class="code"><pre><span class="line">&gt; torch.cat(</span><br><span class="line">    (t1,t2,t3)</span><br><span class="line">    ,dim=<span class="number">0</span></span><br><span class="line">)</span><br><span class="line">tensor([<span class="number">1</span>, <span class="number">1</span>, <span class="number">1</span>, <span class="number">2</span>, <span class="number">2</span>, <span class="number">2</span>, <span class="number">3</span>, <span class="number">3</span>, <span class="number">3</span>])</span><br></pre></td></tr></table></figure>

<p>可以看出我们通过连接操作得到了一个轴长度为 9 的张量。</p>
<p>现在，让我们沿着我们将插入的新轴<strong>堆叠</strong>这些张量。我们将在第一个索引处插入一个轴。请注意，此插入将在<code>stack</code>函数的后台隐式发生 。</p>
<figure class="highlight python"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br></pre></td><td class="code"><pre><span class="line">&gt; torch.stack(</span><br><span class="line">	(t1, t2, t3),</span><br><span class="line">    dim=<span class="number">0</span></span><br><span class="line">)</span><br><span class="line">tensor([[<span class="number">1</span>, <span class="number">1</span>, <span class="number">1</span>],</span><br><span class="line">        [<span class="number">2</span>, <span class="number">2</span>, <span class="number">2</span>],</span><br><span class="line">        [<span class="number">3</span>, <span class="number">3</span>, <span class="number">3</span>]])</span><br></pre></td></tr></table></figure>

<p>可以看出我们通过堆叠操作得到了一个形状为 <code>3 x 3</code> 的张量。</p>
<p>也可以通过第二种做法得到这样的效果，即先对张量进行<code>unsqueeze</code>操作，在进行连接<code>cat</code>。</p>
<figure class="highlight python"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br></pre></td><td class="code"><pre><span class="line">&gt; torch.cat(</span><br><span class="line">    (</span><br><span class="line">         t1.unsqueeze(<span class="number">0</span>)</span><br><span class="line">        ,t2.unsqueeze(<span class="number">0</span>)</span><br><span class="line">        ,t3.unsqueeze(<span class="number">0</span>)</span><br><span class="line">    )</span><br><span class="line">    ,dim=<span class="number">0</span></span><br><span class="line">)</span><br><span class="line">tensor([[<span class="number">1</span>, <span class="number">1</span>, <span class="number">1</span>],</span><br><span class="line">        [<span class="number">2</span>, <span class="number">2</span>, <span class="number">2</span>],</span><br><span class="line">        [<span class="number">3</span>, <span class="number">3</span>, <span class="number">3</span>]])</span><br></pre></td></tr></table></figure>

<p>在这种情况下，我们可以看到我们得到的结果与通过堆叠得到的结果相同。</p>
<p>但是需要注意的是，我们想沿着第二个轴连接 3 个张量的话，光改变<code>dim</code>是无法做到的，这是因为当前<strong>不存在第二个轴</strong>，不存在咋连接？对吧。因此在这种情况下，我们只能使用堆叠操作完成。</p>
<figure class="highlight python"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br></pre></td><td class="code"><pre><span class="line">&gt; torch.stack(</span><br><span class="line">    (t1,t2,t3)</span><br><span class="line">    ,dim=<span class="number">1</span></span><br><span class="line">)</span><br><span class="line">tensor([[<span class="number">1</span>, <span class="number">2</span>, <span class="number">3</span>],</span><br><span class="line">        [<span class="number">1</span>, <span class="number">2</span>, <span class="number">3</span>],</span><br><span class="line">        [<span class="number">1</span>, <span class="number">2</span>, <span class="number">3</span>]])</span><br></pre></td></tr></table></figure>

<p>如果对原有的三个张量<code>t1</code> <code>t2</code> <code>t3</code> ，先进行添加轴再连接，才能得到上述堆叠操作的相同结果。</p>
<figure class="highlight python"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br></pre></td><td class="code"><pre><span class="line">&gt; torch.cat(</span><br><span class="line">    (</span><br><span class="line">         t1.unsqueeze(<span class="number">1</span>)</span><br><span class="line">        ,t2.unsqueeze(<span class="number">1</span>)</span><br><span class="line">        ,t3.unsqueeze(<span class="number">1</span>)</span><br><span class="line">    )</span><br><span class="line">    ,dim=<span class="number">1</span></span><br><span class="line">)</span><br><span class="line">tensor([[<span class="number">1</span>, <span class="number">2</span>, <span class="number">3</span>],</span><br><span class="line">        [<span class="number">1</span>, <span class="number">2</span>, <span class="number">3</span>],</span><br><span class="line">        [<span class="number">1</span>, <span class="number">2</span>, <span class="number">3</span>]])</span><br></pre></td></tr></table></figure>



<h3 id="TensorFlow里的-Stack-Vs-Concat"><a href="#TensorFlow里的-Stack-Vs-Concat" class="headerlink" title="TensorFlow里的 Stack Vs Concat"></a>TensorFlow里的 Stack Vs Concat</h3><p>如果不感兴趣直接跳过~</p>
<p>同样的，先创建三个张量<code>t1</code> <code>t2</code> <code>t3</code> </p>
<figure class="highlight python"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">import</span> tensorflow <span class="keyword">as</span> tf</span><br><span class="line"></span><br><span class="line">t1 = tf.constant([<span class="number">1</span>,<span class="number">1</span>,<span class="number">1</span>])</span><br><span class="line">t2 = tf.constant([<span class="number">2</span>,<span class="number">2</span>,<span class="number">2</span>])</span><br><span class="line">t3 = tf.constant([<span class="number">3</span>,<span class="number">3</span>,<span class="number">3</span>])</span><br></pre></td></tr></table></figure>

<p>现在，让我们将这些张量相互连接起来。为了在 TensorFlow 中做到这一点，我们使用的是<code>tf.concat()</code>函数，在PyTorch中指定的是<code>dim</code>，在TensorFlow 中，我们指定的是<code>axis</code>（轴），意思其实是相同的。</p>
<figure class="highlight python"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br></pre></td><td class="code"><pre><span class="line">&gt; tf.concat( </span><br><span class="line">    (t1,t2,t3) </span><br><span class="line">    ,axis= <span class="number">0</span> </span><br><span class="line">) </span><br><span class="line">tf.Tensor: <span class="built_in">id</span> = <span class="number">4</span> , shape=( <span class="number">9</span> ,), dtype=int32, numpy=array([ <span class="number">1</span> , <span class="number">1</span> , <span class="number">1</span> , <span class="number">2</span> , <span class="number">2</span> , <span class="number">2</span> , <span class="number">3</span> , <span class="number">3</span> , <span class="number">3</span> ])</span><br></pre></td></tr></table></figure>

<p>现在，堆叠操作如下所示：</p>
<figure class="highlight python"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br></pre></td><td class="code"><pre><span class="line">&gt; tf.stack( </span><br><span class="line">    (t1,t2,t3) </span><br><span class="line">    ,axis= <span class="number">0</span> </span><br><span class="line">) </span><br><span class="line">tf.Tensor: <span class="built_in">id</span> = <span class="number">6</span> , shape=( <span class="number">3</span> , <span class="number">3</span> ), dtype=int32, numpy= </span><br><span class="line">array([[ <span class="number">1</span> , <span class="number">1</span> , <span class="number">1</span> ], </span><br><span class="line">       [ <span class="number">2</span> , <span class="number">2</span> , <span class="number">2</span> ], </span><br><span class="line">       [ <span class="number">3</span> , <span class="number">3</span> , <span class="number">3</span> ]])</span><br></pre></td></tr></table></figure>

<p>同PyTorch一样，我们也试着在对张量手动插入新维度（添加新的轴）后连接这些张量。</p>
<figure class="highlight python"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br></pre></td><td class="code"><pre><span class="line">&gt; tf.concat( </span><br><span class="line">    ( </span><br><span class="line">         tf.expand_dims(t1, <span class="number">0</span> ) </span><br><span class="line">        ,tf.expand_dims(t2, <span class="number">0</span> ) </span><br><span class="line">        ,tf.expand_dims(t3, <span class="number">0</span> ) </span><br><span class="line">    )     </span><br><span class="line">    ,axis= <span class="number">0</span> </span><br><span class="line">) </span><br><span class="line">tf.Tensor: <span class="built_in">id</span> = <span class="number">15</span> , shape=( <span class="number">3</span> , <span class="number">3</span> ), dtype=int32, numpy= </span><br><span class="line">array([[ <span class="number">1</span> , <span class="number">1</span> , <span class="number">1</span> ], </span><br><span class="line">       [ <span class="number">2</span> , <span class="number">2</span> , <span class="number">2</span> ], </span><br><span class="line">       [ <span class="number">3</span> , <span class="number">3</span> , <span class="number">3</span> ]])</span><br></pre></td></tr></table></figure>

<p>可以看出，TensorFlow 使用的相同功能函数名为<code>expand_dims()</code>，这两者也是相同的。（后面不再赘述）</p>
<p><code>Unsqueezing and expanding dims mean the same thing.</code></p>
<p>接下来，对张量相对于第二个轴进行堆叠操作：</p>
<figure class="highlight python"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br></pre></td><td class="code"><pre><span class="line">&gt; tf.stack(</span><br><span class="line">    (t1,t2,t3)</span><br><span class="line">    ,axis=<span class="number">1</span></span><br><span class="line">)</span><br><span class="line">tf.Tensor: <span class="built_in">id</span>=<span class="number">17</span>, shape=(<span class="number">3</span>, <span class="number">3</span>), dtype=int32, numpy=</span><br><span class="line">array([[<span class="number">1</span>, <span class="number">2</span>, <span class="number">3</span>],</span><br><span class="line">       [<span class="number">1</span>, <span class="number">2</span>, <span class="number">3</span>],</span><br><span class="line">       [<span class="number">1</span>, <span class="number">2</span>, <span class="number">3</span>]])</span><br></pre></td></tr></table></figure>

<p>起同样效果的：</p>
<figure class="highlight plaintext"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br></pre></td><td class="code"><pre><span class="line">&gt; tf.concat(</span><br><span class="line">	(</span><br><span class="line">		tf.expand_dims(t1, 1),</span><br><span class="line">		tf.expand_dims(t2, 1),</span><br><span class="line">		tf.expand_dims(t3, 1)</span><br><span class="line">	),</span><br><span class="line">	axis = 1</span><br><span class="line">)</span><br><span class="line">tf.Tensor: id = 26 , shape=( 3 , 3 ), dtype=int32, numpy= </span><br><span class="line">array([[ 1 , 2 , 3 ], </span><br><span class="line">       [ 1 , 2 , 3 ], </span><br><span class="line">       [ 1 , 2 , 3 ]])</span><br></pre></td></tr></table></figure>

<p>可以观察到，这些操作所得的结果都是与 PyTorch 一致的。</p>
<h3 id="NumPy-里的-Stack-Vs-Concat"><a href="#NumPy-里的-Stack-Vs-Concat" class="headerlink" title="NumPy 里的 Stack Vs Concat"></a>NumPy 里的 Stack Vs Concat</h3><p>同样的，先创建三个张量<code>t1</code> <code>t2</code> <code>t3</code> ，在 numpy 里，张量其实就是nd-array：</p>
<figure class="highlight python"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">import</span> numpy <span class="keyword">as</span> np</span><br><span class="line"></span><br><span class="line">t1 = np.array([<span class="number">1</span>,<span class="number">1</span>,<span class="number">1</span>])</span><br><span class="line">t2 = np.array([<span class="number">2</span>,<span class="number">2</span>,<span class="number">2</span>])</span><br><span class="line">t3 = np.array([<span class="number">3</span>,<span class="number">3</span>,<span class="number">3</span>])</span><br></pre></td></tr></table></figure>

<p>连接操作，使用<code>np.concatenate()</code>函数：</p>
<figure class="highlight python"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br></pre></td><td class="code"><pre><span class="line">&gt; np.concatenate(</span><br><span class="line">    (t1,t2,t3)</span><br><span class="line">    ,axis=<span class="number">0</span></span><br><span class="line">)</span><br><span class="line">array([<span class="number">1</span>, <span class="number">1</span>, <span class="number">1</span>, <span class="number">2</span>, <span class="number">2</span>, <span class="number">2</span>, <span class="number">3</span>, <span class="number">3</span>, <span class="number">3</span>])</span><br></pre></td></tr></table></figure>

<p>与 TensorFlow 一样，NumPy 也使用<code>axis</code>作为轴参数名，但在这里，我们还看到了另一种命名变化：NumPy 使用完整的单词 <code>concatenate</code>作为函数名。</p>
<p>下面是不同的库所对应的函数名：</p>
<table>
<thead>
<tr>
<th>Library</th>
<th>Function Name</th>
</tr>
</thead>
<tbody><tr>
<td>PyTorch</td>
<td><code>cat()</code></td>
</tr>
<tr>
<td>TensorFlow</td>
<td><code>concat()</code></td>
</tr>
<tr>
<td>NumPy</td>
<td><code>concatenate()</code></td>
</tr>
</tbody></table>
<p>堆叠操作：</p>
<figure class="highlight python"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br></pre></td><td class="code"><pre><span class="line">&gt; np.stack(</span><br><span class="line">    (t1,t2,t3)</span><br><span class="line">    ,axis=<span class="number">0</span></span><br><span class="line">)</span><br><span class="line">array([[<span class="number">1</span>, <span class="number">1</span>, <span class="number">1</span>],</span><br><span class="line">       [<span class="number">2</span>, <span class="number">2</span>, <span class="number">2</span>],</span><br><span class="line">       [<span class="number">3</span>, <span class="number">3</span>, <span class="number">3</span>]])</span><br></pre></td></tr></table></figure>

<p>手动添加轴，再连接：</p>
<figure class="highlight python"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br></pre></td><td class="code"><pre><span class="line">&gt; np.concatenate( </span><br><span class="line">    ( </span><br><span class="line">         np.expand_dims(t1, <span class="number">0</span> ) </span><br><span class="line">        ,np.expand_dims(t2, <span class="number">0</span> ) </span><br><span class="line">        ,np.expand_dims(t3, <span class="number">0</span> ) </span><br><span class="line">    ) </span><br><span class="line">    ,axis= <span class="number">0</span> </span><br><span class="line">) </span><br><span class="line">array([[ <span class="number">1</span> , <span class="number">1</span> , <span class="number">1</span> ], </span><br><span class="line">       [ <span class="number">2</span> , <span class="number">2</span> , <span class="number">2</span> ], </span><br><span class="line">       [ <span class="number">3</span> , <span class="number">3</span> , <span class="number">3</span> ]])</span><br></pre></td></tr></table></figure>

<p>使用第二个轴来完成堆叠操作：</p>
<figure class="highlight python"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br></pre></td><td class="code"><pre><span class="line">&gt; np.stack( </span><br><span class="line">    (t1,t2,t3) </span><br><span class="line">    ,axis= <span class="number">1</span> </span><br><span class="line">) </span><br><span class="line">array([[ <span class="number">1</span> , <span class="number">2</span> , <span class="number">3</span> ], </span><br><span class="line">       [ <span class="number">1</span> , <span class="number">2</span> , <span class="number">3</span> ], </span><br><span class="line">       [ <span class="number">1</span> , <span class="number">2</span> , <span class="number">3</span> ]])</span><br></pre></td></tr></table></figure>

<p>通过手动插入维度连接：</p>
<figure class="highlight python"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br></pre></td><td class="code"><pre><span class="line">&gt; np.concatenate( </span><br><span class="line">    ( </span><br><span class="line">         np.expand_dims(t1, <span class="number">1</span> ) </span><br><span class="line">        ,np.expand_dims(t2, <span class="number">1</span> ) </span><br><span class="line">        ,np.expand_dims(t3, <span class="number">1</span> ) </span><br><span class="line">    ) </span><br><span class="line">    ,axis= <span class="number">1</span> </span><br><span class="line">) </span><br><span class="line">array([[ <span class="number">1</span> , <span class="number">2</span> , <span class="number">3</span> ], </span><br><span class="line">       [ <span class="number">1</span> , <span class="number">2</span> , <span class="number">3</span> ], </span><br><span class="line">       [ <span class="number">1</span> , <span class="number">2</span> , <span class="number">3</span> ]])</span><br></pre></td></tr></table></figure>

<h2 id="现实中使用连接和堆叠的例子"><a href="#现实中使用连接和堆叠的例子" class="headerlink" title="现实中使用连接和堆叠的例子"></a>现实中使用连接和堆叠的例子</h2><h3 id="将图像合并为一个批次"><a href="#将图像合并为一个批次" class="headerlink" title="将图像合并为一个批次"></a>将图像合并为一个批次</h3><p>假设我们有三个单独的图像作为张量。每个图像张量都有三个维度，一个通道轴，一个高度轴，一个宽度轴。请注意，这些张量中的每一个都是相互独立的。现在，假设我们的任务是将这些张量连接在一起以形成三个图像的单个批量张量。</p>
<p><em>我们是连接还是堆叠？</em></p>
<p>答案是进行堆叠，由于在此示例中，仅存在三个维度，而对于一个批次来说，我们需要四个维度。这意味着答案是沿新轴堆叠张量，这个轴我们将其称为批次轴即<code>batch axis</code>。这将为我们处理得到一个具有四个维度的张量。</p>
<p>就像这样：</p>
<figure class="highlight python"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">import</span> torch</span><br><span class="line"><span class="comment"># 创建三个张量，代表着3通道，大小为 28 * 28 pixel的图像</span></span><br><span class="line">t1 = torch.zeros(<span class="number">3</span>,<span class="number">28</span>,<span class="number">28</span>)</span><br><span class="line">t2 = torch.zeros(<span class="number">3</span>,<span class="number">28</span>,<span class="number">28</span>)</span><br><span class="line">t3 = torch.zeros(<span class="number">3</span>,<span class="number">28</span>,<span class="number">28</span>)</span><br><span class="line"></span><br><span class="line"><span class="comment"># 三张图像堆叠，即是得到一个具有三张图片的批次batch</span></span><br><span class="line">torch.stack(</span><br><span class="line">    (t1,t2,t3)</span><br><span class="line">    ,dim=<span class="number">0</span></span><br><span class="line">).shape</span><br><span class="line"></span><br><span class="line"><span class="comment">## output ##</span></span><br><span class="line">torch.Size([<span class="number">3</span>, <span class="number">3</span>, <span class="number">28</span>, <span class="number">28</span>])</span><br></pre></td></tr></table></figure>

<h3 id="将批次合并为一个批次"><a href="#将批次合并为一个批次" class="headerlink" title="将批次合并为一个批次"></a>将批次合并为一个批次</h3><p>假设我们拥有与之前相同的三张图像，但这次图像已经具有批次的维度。这实际上意味着我们有三个批次，batch_size 为 1 。</p>
<p><em>我们是连接还是堆叠？</em></p>
<p>答案是<strong>连接</strong>。</p>
<p>上述意味着我们可以沿着批次维度连接这些批次。在这种情况下，不需要堆叠。</p>
<p>就像这样：</p>
<figure class="highlight python"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">import</span> torch </span><br><span class="line">t1 = torch.zeros( <span class="number">1</span> , <span class="number">3</span> , <span class="number">28</span> , <span class="number">28</span> ) </span><br><span class="line">t2 = torch.zeros( <span class="number">1</span> , <span class="number">3</span> , <span class="number">28</span> , <span class="number">28</span> ) </span><br><span class="line">t3 = torch.zeros( <span class="number">1</span> , <span class="number">3</span> , <span class="number">28</span> , <span class="number">28</span> ) </span><br><span class="line">torch.cat( </span><br><span class="line">    (t1 ,t2, t3) </span><br><span class="line">    ,dim= <span class="number">0</span> </span><br><span class="line">).shape <span class="comment">## output ## </span></span><br><span class="line">torch.Size([ <span class="number">3</span> , <span class="number">3</span> , <span class="number">28</span> , <span class="number">28</span> ])</span><br></pre></td></tr></table></figure>

<p>最终得到一个张量，这个张量代表着三个批次的图像，每批次图像只有一张。</p>
<h3 id="将图像与现有批次合并"><a href="#将图像与现有批次合并" class="headerlink" title="将图像与现有批次合并"></a>将图像与现有批次合并</h3><p>假设我们有相同的三个独立的图像张量。只是，这一次，我们已经有了一个批次的张量。假设我们的任务是将这三个单独的图像与这个批次连接起来。<em>我们是连接还是堆叠？</em></p>
<p>这实际上是一项非常常见的任务，我们如果对这两个操作足够熟悉应该是能够知道答案是<strong>先堆叠然后连接。</strong></p>
<p>就像这样：</p>
<figure class="highlight python"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">import</span> torch</span><br><span class="line">batch = torch.zeros(<span class="number">3</span>,<span class="number">3</span>,<span class="number">28</span>,<span class="number">28</span>)</span><br><span class="line">t1 = torch.zeros(<span class="number">3</span>,<span class="number">28</span>,<span class="number">28</span>)</span><br><span class="line">t2 = torch.zeros(<span class="number">3</span>,<span class="number">28</span>,<span class="number">28</span>)</span><br><span class="line">t3 = torch.zeros(<span class="number">3</span>,<span class="number">28</span>,<span class="number">28</span>)</span><br><span class="line"></span><br><span class="line">torch.cat(</span><br><span class="line">    (</span><br><span class="line">        batch</span><br><span class="line">        ,torch.stack(</span><br><span class="line">            (t1,t2,t3)</span><br><span class="line">            ,dim=<span class="number">0</span></span><br><span class="line">        )</span><br><span class="line">    )</span><br><span class="line">    ,dim=<span class="number">0</span></span><br><span class="line">).shape</span><br><span class="line"></span><br><span class="line"><span class="comment">## output ##</span></span><br><span class="line">torch.Size([<span class="number">6</span>, <span class="number">3</span>, <span class="number">28</span>, <span class="number">28</span>])</span><br></pre></td></tr></table></figure>

<p>老样子，堆叠换成手动添加一个轴再连接：</p>
<figure class="highlight python"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">import</span> torch</span><br><span class="line">batch = torch.zeros(<span class="number">3</span>,<span class="number">3</span>,<span class="number">28</span>,<span class="number">28</span>)</span><br><span class="line">t1 = torch.zeros(<span class="number">3</span>,<span class="number">28</span>,<span class="number">28</span>)</span><br><span class="line">t2 = torch.zeros(<span class="number">3</span>,<span class="number">28</span>,<span class="number">28</span>)</span><br><span class="line">t3 = torch.zeros(<span class="number">3</span>,<span class="number">28</span>,<span class="number">28</span>)</span><br><span class="line"></span><br><span class="line">torch.cat(</span><br><span class="line">    (</span><br><span class="line">        batch</span><br><span class="line">        ,t1.unsqueeze(<span class="number">0</span>)</span><br><span class="line">        ,t2.unsqueeze(<span class="number">0</span>)</span><br><span class="line">        ,t3.unsqueeze(<span class="number">0</span>)</span><br><span class="line">    )</span><br><span class="line">    ,dim=<span class="number">0</span></span><br><span class="line">).shape</span><br><span class="line"></span><br><span class="line"><span class="comment">## output ##</span></span><br><span class="line">torch.Size([<span class="number">6</span>, <span class="number">3</span>, <span class="number">28</span>, <span class="number">28</span>])</span><br></pre></td></tr></table></figure>

<p>🆗，这一集我们知道了如何在不同的框架中进行张量连接和堆叠操作，那么下一集即是有关混淆矩阵的内容。</p>
<h2 id="使用-PyTorch-创建混淆矩阵"><a href="#使用-PyTorch-创建混淆矩阵" class="headerlink" title="使用 PyTorch 创建混淆矩阵"></a>使用 PyTorch 创建混淆矩阵</h2><p>在这一集中，我们将构建一些函数，使我们能够获得训练集中每个样本的预测张量。</p>
<p>然后，我们将看到如何利用这个预测张量以及每个样本的标签来创建<strong>混淆矩阵</strong>。这个混淆矩阵将使我们能够看到我们的网络相互混淆了哪些类别。事不宜迟，让我们开始吧。</p>
<p>我们现在在课程中的位置。</p>
<ul>
<li>准备数据</li>
<li>构建模型</li>
<li>训练模型</li>
<li>分析模型的结果<ul>
<li><strong>构建、绘制和解释混淆矩阵</strong></li>
</ul>
</li>
</ul>
<h3 id="混淆矩阵要求"><a href="#混淆矩阵要求" class="headerlink" title="混淆矩阵要求"></a>混淆矩阵要求</h3><p>要为我们的整个数据集创建一个混淆矩阵，我们需要有一个与我们的训练集长度相同的单一维度的预测张量。</p>
<figure class="highlight python"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br></pre></td><td class="code"><pre><span class="line">&gt; <span class="built_in">len</span> (train_set)</span><br><span class="line"> <span class="number">60000</span></span><br></pre></td></tr></table></figure>

<p>这个预测张量将包含我们训练集中每个样本的十个预测。获得这个张量后，我们可以使用标签张量来生成混淆矩阵。</p>
<figure class="highlight python"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br></pre></td><td class="code"><pre><span class="line">&gt; <span class="built_in">len</span> (train_set.targets)</span><br><span class="line"> <span class="number">60000</span></span><br></pre></td></tr></table></figure>

<p>混淆矩阵将向我们展示模型在哪里变得混淆。更具体地说，混淆矩阵将向我们显示模型正确预测的类别以及模型错误预测的类别。对于不正确的预测，我们将能够看到模型预测的是哪个类别，这将向我们显示哪些类别 <em>混淆</em>了模型。</p>
<h3 id="获取整个训练集的预测"><a href="#获取整个训练集的预测" class="headerlink" title="获取整个训练集的预测"></a>获取整个训练集的预测</h3><p>为了获得所有训练集样本的预测，我们需要将所有样本向前传递通过网络。为此，可以创建batch_size为1的<code>DataLoader</code>，这样将一次将单个批次传递给网络，并将为我们提供所有训练集样本所需的预测张量。 </p>
<p>然而，如果我们在不同的数据集上训练，根据计算资源和训练集的大小，我们需要一种方法来预测较小的批次并收集结果。为了收集结果，我们将使用该<code>torch.cat()</code>函数将输出张量连接在一起以获得我们的单个预测张量。让我们构建一个函数来做到这一点。</p>
<h4 id="构建一个函数来获得所有样本的预测"><a href="#构建一个函数来获得所有样本的预测" class="headerlink" title="构建一个函数来获得所有样本的预测"></a>构建一个函数来获得所有样本的预测</h4><p>我们将创建一个名为<code>get_all_preds()</code>的函数，我们将传递一个模型和一个data loader。该模型将用于获得预测值，data loader将用于提供训练集中的批次。</p>
<figure class="highlight python"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br></pre></td><td class="code"><pre><span class="line"><span class="meta">@torch.no_grad()</span></span><br><span class="line"><span class="function"><span class="keyword">def</span> <span class="title">get_all_preds</span>(<span class="params">model, loader</span>):</span></span><br><span class="line">    all_preds = torch.tensor([])</span><br><span class="line">    <span class="keyword">for</span> batch <span class="keyword">in</span> loader:</span><br><span class="line">        images, labels = batch</span><br><span class="line"></span><br><span class="line">        preds = model(images)</span><br><span class="line">        all_preds = torch.cat(</span><br><span class="line">            (all_preds, preds)</span><br><span class="line">            ,dim=<span class="number">0</span></span><br><span class="line">        )</span><br><span class="line">    <span class="keyword">return</span> all_preds</span><br></pre></td></tr></table></figure>

<p>此函数的植入会创建一个空张量<code>all_preds</code>以保存输出预测。然后，它迭代来自data loader的批次，并将输出预测与 <code>all_preds</code>张量连接起来。最后，所有的预测<code>all_preds</code>，返回给调用者。</p>
<p>请注意，在顶部，我们使用<code>@torch.no_grad()</code>PyTorch 装饰器对函数进行了注释。这是因为我们希望此函数执行<strong>省略****梯度跟踪</strong>。</p>
<p>这是因为梯度跟踪使用内存，并且在推理期间（在不训练的同时获得预测）不需要跟踪计算图。装饰器是在执行特定功能时局部关闭梯度跟踪功能的一种方式。</p>
<p>另外一种局部关闭梯度计算功能的方式</p>
<figure class="highlight python"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">with</span> torch.no_grad():</span><br><span class="line">    prediction_loader = torch.utils.data.DataLoader(train_set, batch_size=<span class="number">10000</span>)</span><br><span class="line">    train_preds = get_all_preds(network, prediction_loader)</span><br></pre></td></tr></table></figure>

<h4 id="使用预测张量"><a href="#使用预测张量" class="headerlink" title="使用预测张量"></a>使用预测张量</h4><p>现在，我们有了预测张量，我们可以将它<code>get_num_correct()</code>与训练集标签一起传递给我们在前一集中创建的函数，以获得正确预测的总数。</p>
<figure class="highlight python"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br></pre></td><td class="code"><pre><span class="line">&gt; preds_correct = get_num_correct(train_preds, train_set.targets)</span><br><span class="line"></span><br><span class="line">&gt; <span class="built_in">print</span>(<span class="string">&#x27;total correct:&#x27;</span>, preds_correct)</span><br><span class="line">&gt; <span class="built_in">print</span>(<span class="string">&#x27;accuracy:&#x27;</span>, preds_correct / <span class="built_in">len</span>(train_set))</span><br><span class="line">total correct: <span class="number">53578</span></span><br><span class="line">accuracy: <span class="number">0.8929666666666667</span></span><br></pre></td></tr></table></figure>

<p>我们可以看到正确预测的总数，并通过除以训练集中的样本数来打印准确率。</p>
<h3 id="构建混淆矩阵"><a href="#构建混淆矩阵" class="headerlink" title="构建混淆矩阵"></a>构建混淆矩阵</h3><p>我们构建混淆矩阵的任务是计算相对于真实值（targets）的预测值数量。</p>
<p>这将创建一个矩阵作为热图，告诉我们预测值相对于真实值的下降位置。</p>
<p>为此，我们需要有<code>targets</code>张量和来自<code>train_preds</code>张量的预测标签。</p>
<figure class="highlight python"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br></pre></td><td class="code"><pre><span class="line">&gt; train_set.targets</span><br><span class="line">tensor([<span class="number">9</span>, <span class="number">0</span>, <span class="number">0</span>,  ..., <span class="number">3</span>, <span class="number">0</span>, <span class="number">5</span>])</span><br><span class="line"></span><br><span class="line">&gt; train_preds.argmax(dim=<span class="number">1</span>)</span><br><span class="line">tensor([<span class="number">9</span>, <span class="number">0</span>, <span class="number">0</span>,  ..., <span class="number">3</span>, <span class="number">0</span>, <span class="number">5</span>])</span><br></pre></td></tr></table></figure>

<p>现在，如果我们按元素比较两个张量，我们可以查看预测值是否与目标匹配。此外，如果我们计算预测值与目标标签的数量，两个张量内的值将作为我们矩阵的坐标。让我们沿着第二维堆叠这两个张量，这样我们就可以得到<code>60,000</code>个有序对。 </p>
<figure class="highlight python"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br></pre></td><td class="code"><pre><span class="line"><span class="comment"># 预测值和标签两个张量进行堆叠</span></span><br><span class="line">&gt; stacked = torch.stack(</span><br><span class="line">    (</span><br><span class="line">        train_set.targets</span><br><span class="line">        ,train_preds.argmax(dim=<span class="number">1</span>)</span><br><span class="line">    )</span><br><span class="line">    ,dim=<span class="number">1</span></span><br><span class="line">)</span><br><span class="line"></span><br><span class="line">&gt; stacked.shape</span><br><span class="line">torch.Size([<span class="number">60000</span>, <span class="number">2</span>])</span><br><span class="line"></span><br><span class="line">&gt; stacked</span><br><span class="line">tensor([</span><br><span class="line">    [<span class="number">9</span>, <span class="number">9</span>],</span><br><span class="line">    [<span class="number">0</span>, <span class="number">0</span>],</span><br><span class="line">    [<span class="number">0</span>, <span class="number">0</span>],</span><br><span class="line">    ...,</span><br><span class="line">    [<span class="number">3</span>, <span class="number">3</span>],</span><br><span class="line">    [<span class="number">0</span>, <span class="number">0</span>],</span><br><span class="line">    [<span class="number">5</span>, <span class="number">5</span>]</span><br><span class="line">])</span><br><span class="line"></span><br><span class="line">&gt; stacked[<span class="number">0</span>].tolist()</span><br><span class="line">[<span class="number">9</span>, <span class="number">9</span>]</span><br></pre></td></tr></table></figure>

<p>现在，我们可以迭代这些对并计算矩阵中每个位置的出现次数。让我们创建矩阵。由于我们有十个预测类别，我们将有一个十乘十的矩阵。</p>
<figure class="highlight python"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br></pre></td><td class="code"><pre><span class="line"><span class="comment"># cmt: confusion matrix</span></span><br><span class="line">&gt; cmt = torch.zeros(<span class="number">10</span>,<span class="number">10</span>, dtype=torch.int64)</span><br><span class="line">&gt; cmt</span><br><span class="line">tensor([</span><br><span class="line">    [<span class="number">0</span>, <span class="number">0</span>, <span class="number">0</span>, <span class="number">0</span>, <span class="number">0</span>, <span class="number">0</span>, <span class="number">0</span>, <span class="number">0</span>, <span class="number">0</span>, <span class="number">0</span>],</span><br><span class="line">    [<span class="number">0</span>, <span class="number">0</span>, <span class="number">0</span>, <span class="number">0</span>, <span class="number">0</span>, <span class="number">0</span>, <span class="number">0</span>, <span class="number">0</span>, <span class="number">0</span>, <span class="number">0</span>],</span><br><span class="line">    [<span class="number">0</span>, <span class="number">0</span>, <span class="number">0</span>, <span class="number">0</span>, <span class="number">0</span>, <span class="number">0</span>, <span class="number">0</span>, <span class="number">0</span>, <span class="number">0</span>, <span class="number">0</span>],</span><br><span class="line">    [<span class="number">0</span>, <span class="number">0</span>, <span class="nu <p>在这里需要注意的是，作者这里导入的<code>plotcm</code>是本地文件，即是位于当前目录中名为<code>resource</code>的文件夹中的<code>plotcm.py</code>文件。<strong>我们将在本地中实现它</strong>。它的作用是借助<code>plot</code>库绘制<code>confusion matrix</code>。</p>
<p>首先我们先生成一个混淆矩阵（由于是在不同的时间生成的示例，所以在这里作者得到的矩阵不相同）：</p>
<figure class="highlight python"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br></pre></td><td class="code"><pre><span class="line">&gt; cm = confusion_matrix(train_set.targets, train_preds.argmax(dim=<span class="number">1</span>))</span><br><span class="line">&gt; <span class="built_in">print</span>(<span class="built_in">type</span>(cm))</span><br><span class="line">&gt; cm</span><br><span class="line"></span><br><span class="line">&lt;<span class="class"><span class="keyword">class</span> &#x27;<span class="title">numpy</span>.<span class="title">ndarray</span>&#x27;&gt;  # 得到<span class="title">numpy</span>.<span class="title">ndarray</span>类型的混淆矩阵</span></span><br><span class="line"><span class="class"><span class="title">Out</span>[74]:</span></span><br><span class="line">array([[<span class="number">5431</span>,   <span class="number">14</span>,   <span class="number">88</span>,  <span class="number">145</span>,   <span class="number">26</span>,    <span class="number">7</span>,  <span class="number">241</span>,    <span class="number">0</span>,   <span class="number">48</span>,    <span class="number">0</span>],</span><br><span class="line">        [   <span class="number">4</span>, <span class="number">5896</span>,    <span class="number">6</span>,   <span class="number">75</span>,    <span class="number">8</span>,    <span class="number">0</span>,    <span class="number">8</span>,    <span class="number">0</span>,    <span class="number">3</span>,    <span class="number">0</span>],</span><br><span class="line">        [  <span class="number">92</span>,    <span class="number">6</span>, <span class="number">5002</span>,   <span class="number">76</span>,  <span class="number">565</span>,    <span class="number">1</span>,  <span class="number">232</span>,    <span class="number">1</span>,   <span class="number">25</span>,    <span class="number">0</span>],</span><br><span class="line">        [ <span class="number">191</span>,   <span class="number">49</span>,   <span class="number">23</span>, <span class="number">5504</span>,  <span class="number">162</span>,    <span class="number">1</span>,   <span class="number">61</span>,    <span class="number">0</span>,    <span class="number">7</span>,    <span class="number">2</span>],</span><br><span class="line">        [  <span class="number">15</span>,   <span class="number">12</span>,  <span class="number">267</span>,  <span class="number">213</span>, <span class="number">5305</span>,    <span class="number">1</span>,  <span class="number">168</span>,    <span class="number">0</span>,   <span class="number">19</span>,    <span class="number">0</span>],</span><br><span class="line">        [   <span class="number">0</span>,    <span class="number">0</span>,    <span class="number">0</span>,    <span class="number">0</span>,    <span class="number">0</span>, <span class="number">5847</span>,    <span class="number">0</span>,  <span class="number">112</span>,    <span class="number">3</span>,   <span class="number">38</span>],</span><br><span class="line">        [<span class="number">1159</span>,   <span class="number">16</span>,  <span class="number">523</span>,  <span class="number">189</span>,  <span class="number">676</span>,    <span class="number">0</span>, <span class="number">3396</span>,    <span class="number">0</span>,   <span class="number">41</span>,    <span class="number">0</span>],</span><br><span class="line">        [   <span class="number">0</span>,    <span class="number">0</span>,    <span class="number">0</span>,    <span class="number">0</span>,    <span class="number">0</span>,   <span class="number">99</span>,    <span class="number">0</span>, <span class="number">5540</span>,    <span class="number">0</span>,  <span class="number">361</span>],</span><br><span class="line">        [  <span class="number">28</span>,    <span class="number">6</span>,   <span class="number">29</span>,   <span class="number">15</span>,   <span class="number">32</span>,   <span class="number">23</span>,   <span class="number">26</span>,   <span class="number">14</span>, <span class="number">5827</span>,    <span class="number">0</span>],</span><br><span class="line">        [   <span class="number">0</span>,    <span class="number">0</span>,    <span class="number">0</span>,    <span class="number">0</span>,    <span class="number">1</span>,   <span class="number">61</span>,    <span class="number">0</span>,  <span class="number">107</span>,    <span class="number">1</span>, <span class="number">5830</span>]],</span><br><span class="line">        dtype=int64)</span><br></pre></td></tr></table></figure>

<p><code>plotcm.py </code>的实现:</p>
<figure class="highlight python"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br></pre></td><td class="code"><pre><span class="line"><span class="keyword">import</span> itertools</span><br><span class="line"><span class="keyword">import</span> numpy <span class="keyword">as</span> np</span><br><span class="line"><span class="keyword">import</span> matplotlib.pyplot <span class="keyword">as</span> plt</span><br><span class="line"></span><br><span class="line"><span class="function"><span class="keyword">def</span> <span class="title">plot_confusion_matrix</span>(<span class="params">cm, classes, normalize=<span class="literal">False</span>, title=<span class="string">&#x27;Confusion matrix&#x27;</span>, cmap=plt.cm.Blues</span>):</span></span><br><span class="line">    <span class="keyword">if</span> normalize:</span><br><span class="line">        cm = cm.astype(<span class="string">&#x27;float&#x27;</span>) / cm.<span class="built_in">sum</span>(axis=<span class="number">1</span>)[:, np.newaxis]</span><br><span class="line">        <span class="built_in">print</span>(<span class="string">&quot;Normalized confusion matrix&quot;</span>)</span><br><span class="line">    <span class="keyword">else</span>:</span><br><span class="line">        <span class="built_in">print</span>(<span class="string">&#x27;Confusion matrix, without normalization&#x27;</span>)</span><br><span class="line"></span><br><span class="line">    <span class="built_in">print</span>(cm)</span><br><span class="line">    plt.imshow(cm, interpolation=<span class="string">&#x27;nearest&#x27;</span>, cmap=cmap)</span><br><span class="line">    plt.title(title)</span><br><span class="line">    plt.colorbar()</span><br><span class="line">    tick_marks = np.arange(<span class="built_in">len</span>(classes))</span><br><span class="line">    plt.xticks(tick_marks, classes, rotation=<span class="number">45</span>)</span><br><span class="line">    plt.yticks(tick_marks, classes)</span><br><span class="line"></span><br><span class="line">    fmt = <span class="string">&#x27;.2f&#x27;</span> <span class="keyword">if</span> normalize <span class="keyword">else</span> <span class="string">&#x27;d&#x27;</span></span><br><span class="line">    thresh = cm.<span class="built_in">max</span>() / <span class="number">2.</span></span><br><span class="line">    <span class="keyword">for</span> i, j <span class="keyword">in</span> itertools.product(<span class="built_in">range</span>(cm.shape[<span class="number">0</span>]), <span class="built_in">range</span>(cm.shape[<span class="number">1</span>])):</span><br><span class="line">        plt.text(j, i, <span class="built_in">format</span>(cm[i, j], fmt), horizontalalignment=<span class="string">&quot;center&quot;</span>, color=<span class="string">&quot;white&quot;</span> <span class="keyword">if</span> cm[i, j] &gt; thresh <span class="keyword">else</span> <span class="string">&quot;black&quot;</span>)</span><br><span class="line"></span><br><span class="line">    plt.tight_layout()</span><br><span class="line">    plt.ylabel(<span class="string">&#x27;True label&#x27;</span>)</span><br><span class="line">    plt.xlabel(<span class="string">&#x27;Predicted label&#x27;</span>)</span><br></pre></td></tr></table></figure>

<p>OK，我们接着就可以调用下面函数绘制矩阵：</p>
<figure class="highlight python"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br></pre></td><td class="code"><pre><span class="line">&gt; plt.figure(figsize=(<span class="number">10</span>,<span class="number">10</span>))</span><br><span class="line">&gt; plot_confusion_matrix(cm, train_set.classes)</span><br><span class="line"></span><br><span class="line">Confusion matrix, without normalization</span><br><span class="line">[[<span class="number">5431</span>   <span class="number">14</span>   <span class="number">88</span>  <span class="number">145</span>   <span class="number">26</span>    <span class="number">7</span>  <span class="number">241</span>    <span class="number">0</span>   <span class="number">48</span>    <span class="number">0</span>]</span><br><span class="line">[   <span class="number">4</span> <span class="number">5896</span>    <span class="number">6</span>   <span class="number">75</span>    <span class="number">8</span>    <span class="number">0</span>    <span class="number">8</span>    <span class="number">0</span>    <span class="number">3</span>    <span class="number">0</span>]</span><br><span class="line">[  <span class="number">92</span>    <span class="number">6</span> <span class="number">5002</span>   <span class="number">76</span>  <span class="number">565</span>    <span class="number">1</span>  <span class="number">232</span>    <span class="number">1</span>   <span class="number">25</span>    <span class="number">0</span>]</span><br><span class="line">[ <span class="number">191</span>   <span class="number">49</span>   <span class="number">23</span> <span class="number">5504</span>  <span class="number">162</span>    <span class="number">1</span>   <span class="number">61</span>    <span class="number">0</span>    <span class="number">7</span>    <span class="number">2</span>]</span><br><span class="line">[  <span class="number">15</span>   <span class="number">12</span>  <span class="number">267</span>  <span class="number">213</span> <span class="number">5305</span>    <span class="number">1</span>  <span class="number">168</span>    <span class="number">0</span>   <span class="number">19</span>    <span class="number">0</span>]</span><br><span class="line">[   <span class="number">0</span>    <span class="number">0</span>    <span class="number">0</span>    <span class="number">0</span>    <span class="number">0</span> <span class="number">5847</span>    <span class="number">0</span>  <span class="number">112</span>    <span class="number">3</span>   <span class="number">38</span>]</span><br><span class="line">[<span class="number">1159</span>   <span class="number">16</span>  <span class="number">523</span>  <span class="number">189</span>  <span class="number">676</span>    <span class="number">0</span> <span class="number">3396</span>    <span class="number">0</span>   <span class="number">41</span>    <span class="number">0</span>]</span><br><span class="line">[   <span class="number">0</span>    <span class="number">0</span>    <span class="number">0</span>    <span class="number">0</span>    <span class="number">0</span>   <span class="number">99</span>    <span class="number">0</span> <span class="number">5540</span>    <span class="number">0</span>  <span class="number">361</span>]</span><br><span class="line">[  <span class="number">28</span>    <span class="number">6</span>   <span class="number">29</span>   <span class="number">15</span>   <span class="number">32</span>   <span class="number">23</span>   <span class="number">26</span>   <span class="number">14</span> <span class="number">5827</span>    <span class="number">0</span>]</span><br><span class="line">[   <span class="number">0</span>    <span class="number">0</span>    <span class="number">0</span>    <span class="number">0</span>    <span class="number">1</span>   <span class="number">61</span>    <span class="number">0</span>  <span class="number">107</span>    <span class="number">1</span> <span class="number">5830</span>]]</span><br></pre></td></tr></table></figure>

<p>绘制结果如下：</p>
<p><img src="https://deeplizard.com/assets/jpg/2400a920.jpg" alt="img"></p>
<p>混淆矩阵的解读：</p>
<p>混淆矩阵具有三个轴：</p>
<ol>
<li>预测标签（类）</li>
<li>真标签</li>
<li>热图值（颜色）</li>
</ol>
<p>矩阵对角线表示矩阵中预测和真实值相同的位置，因此这是我们希望热图更暗（颜色更深）的位置。而任何不在对角线上的值都是不正确的预测，因为预测和真实标签不匹配。</p>
<p>我们可以观察到：网络将 T 恤/上衣与衬衫混淆，但不会将 T 恤/上衣与鞋类义务混淆，这是很有道理的。而随着我们的模型进一步训练学习，我们将看到位于对角线之外的数字变得越来越小。</p>
